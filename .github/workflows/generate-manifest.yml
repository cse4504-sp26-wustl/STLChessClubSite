name: Generate PGN Manifest

on:
  push:
    branches: [data]
    paths: ['pgn/*.pgn']

permissions:
  contents: write

jobs:
  manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate manifest.json
        run: |
          node -e "
          const fs = require('fs');
          const files = fs.readdirSync('pgn').filter(f => f.endsWith('.pgn')).sort();
          const rounds = files.map(filename => {
            const base = filename.replace(/\.pgn\$/, '');
            const label = base
              .replace(/[_-]/g, ' ')
              .replace(/([a-z])(\d)/gi, '\$1 \$2')
              .replace(/\b\w/g, c => c.toUpperCase()).trim();
            return { filename, label };
          });
          fs.writeFileSync('pgn/manifest.json', JSON.stringify({ rounds }, null, 2) + '\n');
          console.log('Generated manifest with ' + rounds.length + ' round(s)');
          "

      - name: Commit manifest
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add pgn/manifest.json
          git diff --staged --quiet || git commit -m "chore: regenerate manifest [skip ci]"
          git push
